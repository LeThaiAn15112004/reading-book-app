<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    /* Reset CSS cơ bản */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-app-region: drag; /* Cho phép click giữ để di chuyển cửa sổ Splash */
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Vùng chứa Icon */
    .icon-wrapper {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      color: #f59e0b; /* Màu vàng ấm Amber-500 */
      /* Hiệu ứng phát sáng mờ ảo xung quanh icon */
      filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.3)); 
      animation: pulse 2.5s ease-in-out infinite;
    }

    /* Vẽ viền SVG mượt mà khi vừa xuất hiện */
    .book-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawBook 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* Tên ứng dụng: READMATE */
    .app-title {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #e2e8f0;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
    }

    /* Vai trò ứng dụng: READER */
    .app-subtitle {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.45em;
      color: #64748b; /* Màu xám slate nhẹ */
      margin-top: 8px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards;
    }

    /* Spinner tải dưới đáy */
    .spinner {
      position: absolute;
      bottom: 48px;
      width: 24px;
      height: 24px;
      border: 2px solid #334155;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* --- ANIMATIONS --- */

    /* Hiệu ứng vẽ nét cuốn sách */
    @keyframes drawBook {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* Hiệu ứng thở nhẹ của Icon */
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.2));
      }
      50% {
        transform: scale(1.03);
        filter: drop-shadow(0 0 25px rgba(245, 158, 11, 0.4));
      }
    }

    /* Hiệu ứng trồi lên và hiện hình của Text */
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Vòng xoay Spinner */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <!-- SVG Icon Cuốn sách đang mở tinh tế -->
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor">
        <path class="book-path" stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
      </svg>
    </div>

    <!-- Tên App chính -->
    <div class="app-title">Readmate</div>
    
    <!-- Vai trò định vị dòng máy đọc -->
    <div class="app-subtitle">Reader</div>
  </div>

  <!-- Vòng load siêu mảnh ở dưới đáy -->
  <div class="spinner"></div>

</body>
</html>
